name: senialcdmx
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip

  # Geoespaciales — mejor instalarlas desde conda-forge para evitar conflictos de GDAL
  - geopandas=1.1.3
  - shapely=2.1.0
  - pyproj=3.7.1
  - fiona=1.10.1

  # Utilidades base
  - pandas=2.2.3
  - numpy=2.2.4
  - psycopg2=2.9.10

  - pip:
    - fastapi==0.135.3
    - "uvicorn[standard]==0.34.0"
    - sqlalchemy==2.0.41
    - geoalchemy2==0.17.0
    - pydantic==2.11.1
    - pydantic-settings==2.8.1
    - geopy==2.4.1
    - ibm-watsonx-ai==1.4.7
    - python-dotenv==1.1.0