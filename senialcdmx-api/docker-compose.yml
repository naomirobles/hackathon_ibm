services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: senialcdmx
      POSTGRES_PASSWORD: senialcdmx
      POSTGRES_DB: senialcdmx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
